name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK (with licenses ✅)
        uses: android-actions/setup-android@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-gfx-dev libgl1-mesa-dev libgles2-mesa-dev libmtdev-dev xclip xsel libjpeg-dev libunwind-dev wget
          pip3 install --user buildozer==1.5.0 cython==0.29.33

      - name: Prepare buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          sed -i 's/title = My Application/title = Orange Pi Messenger/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = messenger/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.orangepi/' buildozer.spec
          sed -i 's/requirements = python3/requirements = python3,kivy/' buildozer.spec
          sed -i 's/# android.permissions =/android.permissions = INTERNET,ACCESS_NETWORK_STATE/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/# orientation = portrait/orientation = portrait/' buildozer.spec
          # ✅ Стабильные версии
          sed -i 's/# android.api =/android.api = 33/' buildozer.spec
          sed -i 's/# android.minapi =/android.minapi = 21/' buildozer.spec
          sed -i 's/# android.ndk =/android.ndk = 23b/' buildozer.spec
          sed -i 's/# android.build_tools_version =/android.build_tools_version = 33.0.2/' buildozer.spec

      - name: Build APK
        run: |
          export PATH=$PATH:/home/runner/.local/bin
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          # ✅ Используем уже настроенный SDK
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          buildozer -v android debug
        continue-on-error: true

      - name: Upload APK (if success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: messenger-apk
          path: bin/*.apk
          retention-days: 30
